    <!-- [view, thumb] filenames, in order — rewritten by scripts/build_misc.py.
         Names are content hashes so a changed photo can't be served from a
         stale cache under a recycled name. -->
    <script id="misc-photos" type="application/json">[
  ["869217afa814.jpg", "01dc9313bb91.jpg"],
  ["6f4bbed71d89.jpg", "8c06d8bb4377.jpg"],
  ["0d17ffad7095.jpg", "efd4fa590066.jpg"],

  ["98bc195c55d9.jpg", "ccae090701e0.jpg"]
]</script>

    <div class="gallery" id="gallery">
      <div class="stage">

        <!-- two layers so one can decode underneath while the other is visible -->
        <img class="shot" alt="">

        <button class="gnav prev" type="button" aria-label="Previous photo">&#8249;</button>

<script>
/* ============================================================
   Miscellaneous gallery
   Shuffles the photo order on every visit, then rotates through it
   one at a time. Arrows and the thumbnail grid below share that order.
   ============================================================ */
(function () {
  var root = document.getElementById('gallery');
  if (!root) return;

  var tag = document.getElementById('misc-photos');
  var photos = tag ? JSON.parse(tag.textContent) : [];   // [[view, thumb], …]
  var COUNT = photos.length;
  if (!COUNT) return;
  var DELAY = 5000;      // ms between auto-advances

  var stage   = root.querySelector('.stage');
  var strip   = root.querySelector('.strip');
  var layers  = root.querySelectorAll('.shot');
  var haze    = root.querySelector('.haze');
  var counter = root.querySelector('.count');

  function view(i)  { return 'images/misc/' + photos[i][0]; }
  function thumb(i) { return 'images/misc/thumbs/' + photos[i][1]; }

  // Fisher–Yates — the featured photo differs from visit to visit
  var order = [];
  for (var i = 0; i < COUNT; i++) order.push(i);
  for (var i = order.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = order[i]; order[i] = order[j]; order[j] = t;
  }

  var buttons = order.map(function (photo, slot) {
    var b = document.createElement('button');
    b.type = 'button';
    b.setAttribute('aria-label', 'Show photo ' + (slot + 1) + ' of ' + COUNT);
    var img = document.createElement('img');
    img.src = thumb(photo);
    img.alt = '';
    img.loading = 'lazy';
    img.decoding = 'async';
    b.appendChild(img);
    b.addEventListener('click', function () { go(slot); restart(); });
    strip.appendChild(b);
    return b;
  });

  var pos = 0, front = 0, token = 0;

  function go(slot) {
    slot = ((slot % COUNT) + COUNT) % COUNT;   // wrap both directions
    var mine = ++token;
    pos = slot;

    counter.textContent = (slot + 1) + ' / ' + COUNT;
    buttons.forEach(function (b, i) {
      b.setAttribute('aria-current', i === slot ? 'true' : 'false');
    });

    var back = layers[1 - front];
    back.src = view(order[slot]);
    back.alt = 'Personal photo ' + (slot + 1) + ' of ' + COUNT;

    // fade in only once decoded, so a half-drawn image never shows
    var swap = function () {
      if (mine !== token) return;              // a newer request superseded this
      back.classList.add('on');
      layers[front].classList.remove('on');
      haze.src = back.src;                     // already decoded, so no extra fetch
      front = 1 - front;
    };
    if (back.decode) back.decode().then(swap).catch(swap);
    else swap();

    new Image().src = view(order[(slot + 1) % COUNT]);   // preload the next
  }

  var timer = null;
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)');

  function start() {
    if (timer || reduced.matches) return;
    timer = setInterval(function () { go(pos + 1); }, DELAY);
  }
  function stop() { clearInterval(timer); timer = null; }
  function restart() { stop(); start(); }     // full delay after a manual jump

  root.querySelector('.prev').addEventListener('click', function () { go(pos - 1); restart(); });
  root.querySelector('.next').addEventListener('click', function () { go(pos + 1); restart(); });

  root.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft')  { go(pos - 1); restart(); e.preventDefault(); }
    if (e.key === 'ArrowRight') { go(pos + 1); restart(); e.preventDefault(); }
  });

  // don't rotate while someone is looking at or interacting with a photo
  stage.addEventListener('mouseenter', stop);
  stage.addEventListener('mouseleave', start);
  root.addEventListener('focusin', stop);
  root.addEventListener('focusout', start);
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) stop(); else start();
  });

  go(0);
  start();
})();
</script>
